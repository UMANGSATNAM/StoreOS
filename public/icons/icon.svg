<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>
  
  <!-- Store roof -->
  <path d="M100 200 L256 100 L412 200 Z" fill="url(#roofGrad)" filter="url(#shadow)"/>
  
  <!-- Store body -->
  <rect x="120" y="200" width="272" height="200" rx="8" fill="white" opacity="0.95" filter="url(#shadow)"/>
  
  <!-- Store awning -->
  <path d="M90 200 L110 230 L130 200 L150 230 L170 200 L190 230 L210 200 L230 230 L250 200 L270 230 L290 200 L310 230 L330 200 L350 230 L370 200 L390 230 L410 200 L422 200 L422 200 L256 100 L90 200 Z" fill="#34d399" opacity="0.8"/>
  
  <!-- Door -->
  <rect x="226" y="290" width="60" height="110" rx="4" fill="#059669"/>
  <circle cx="278" cy="348" r="5" fill="#34d399"/>
  
  <!-- Windows -->
  <rect x="140" y="230" width="60" height="50" rx="4" fill="#d1fae5"/>
  <rect x="312" y="230" width="60" height="50" rx="4" fill="#d1fae5"/>
  
  <!-- Window shine -->
  <rect x="145" y="235" width="25" height="40" rx="2" fill="#a7f3d0" opacity="0.6"/>
  <rect x="317" y="235" width="25" height="40" rx="2" fill="#a7f3d0" opacity="0.6"/>
  
  <!-- "S" text -->
  <text x="256" y="175" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)">S</text>
</svg>
